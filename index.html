<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Симулятор Троллейбуса</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* HUD Интерфейс */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            z-index: 10;
            pointer-events: none;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #00ffcc; text-transform: uppercase; }
        .param { margin: 8px 0; font-size: 14px; }
        .value { font-weight: bold; }
        .status-on { color: #00ff00; }
        .status-off { color: #ff3333; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #444;
            z-index: 10;
        }
        .key {
            background: #444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border-bottom: 2px solid #222;
        }
        #warning {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3333;
            background: rgba(0,0,0,0.9);
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            display: none;
            border: 2px solid #ff3333;
            z-index: 10;
        }

        /* Визуализация кабины и руля водителя */
        #cabin-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: linear-gradient(to top, #111 70%, #222 100%);
            border-top: 4px solid #333;
            z-index: 5;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        #steering-wheel-container {
            margin-bottom: -30px;
            perspective: 500px;
        }
        #steering-wheel {
            width: 180px;
            height: 180px;
            border: 18px solid #282828;
            border-radius: 50%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(40deg) rotateZ(0deg);
            box-shadow: inset 0 0 15px #000, 0 10px 20px rgba(0,0,0,0.8);
            background: radial-gradient(circle, transparent 40%, #1a1a1a 41%);
        }
        #steering-wheel::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 18px;
            background: #282828;
            transform: translateY(-50%);
        }
        #steering-wheel::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 18px;
            height: 50%;
            background: #282828;
            transform: translateX(-50%);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="cabin-panel">
        <div id="steering-wheel-container">
            <div id="steering-wheel"></div>
        </div>
    </div>

    <div id="hud">
        <h2>Троллейбус ЗиУ-682</h2>
        <div class="param">Скорость: <span id="speed-val" class="value">0</span> км/ч</div>
        <div class="param">Штанги (Рога): <span id="poles-val" class="value status-off">ОПУЩЕНЫ</span></div>
        <div class="param">Двери: <span id="doors-val" class="value status-on">ОТКРЫТЫ</span></div>
    </div>

    <div id="warning">СНАЧАЛА ПОДНИМИТЕ РОГА (КЛАВИША S)!</div>

    <div id="controls-help">
        <strong>Управление:</strong><br>
        <span class="key">A</span> — Газ | <span class="key">D</span> — Тормоз<br>
        <span class="key">S</span> — Поднять/опустить рога<br>
        <span class="key">W</span> — Открыть/закрыть двери<br>
        <span class="key">←</span> <span class="key">→</span> — Руль (Стрелочки)
    </div>

    <script>
        let scene, camera, renderer;
        let cityModel;

        let state = {
            polesUp: false,
            doorsOpen: true,
            speed: 0,
            maxSpeed: 0.6, 
            braking: 0.015,
            acceleration: 0.008,
            friction: 0.003,
            heading: 0,    
            steering: 0    // Угол поворота руля для анимации
        };

        const keysPressed = {};

        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.015);

            // Спавн игрока: Blender X:0, Y:0, Z:2 -> Three.js X:0, Y:2, Z:0
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            // Генерация базового мира (пока грузится основная карта)
            createFallbackEnvironment();

            // Загрузка карты
            const loader = new THREE.GLTFLoader();
            loader.load(
                './city.glb',
                function (gltf) {
                    cityModel = gltf.scene;
                    scene.add(cityModel);
                    console.log("Карта успешно загружена!");
                },
                null,
                function (error) {
                    console.warn("Файл city.glb не найден. Запущено процедурное окружение.");
                }
            );

            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createFallbackEnvironment() {
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e1e22, roughness: 0.9 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const roadGeo = new THREE.PlaneGeometry(8, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x28282c, roughness: 0.7 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.01;
            scene.add(road);

            // Линии разметки
            for(let i = -500; i < 500; i += 20) {
                const dashGeo = new THREE.PlaneGeometry(0.2, 8);
                const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const dash = new THREE.Mesh(dashGeo, dashMat);
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(0, 0.02, i);
                scene.add(dash);
            }

            // Провода контактной сети
            const wireMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
            const wLGeo = new THREE.CylinderGeometry(0.01, 0.01, 1000);
            const wL = new THREE.Mesh(wLGeo, wireMat);
            wL.rotation.x = Math.PI / 2;
            wL.position.set(-0.7, 7.5, 0);
            scene.add(wL);

            const wR = wL.clone();
            wR.position.set(0.7, 7.5, 0);
            scene.add(wR);
        }

        function onKeyDown(e) {
            // Отменяем дефолтное поведение браузера для игровых клавиш (защита от исчезновения карты)
            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'KeyW', 'KeyS'].includes(e.code)) {
                e.preventDefault();
            }

            keysPressed[e.code] = true;

            if (e.code === 'KeyS') { 
                state.polesUp = !state.polesUp;
                const el = document.getElementById('poles-val');
                if (state.polesUp) {
                    el.innerText = "ПОДНЯТЫ";
                    el.className = "value status-on";
                    document.getElementById('warning').style.display = 'none';
                } else {
                    el.innerText = "ОПУЩЕНЫ";
                    el.className = "value status-off";
                }
            }

            if (e.code === 'KeyW') { 
                state.doorsOpen = !state.doorsOpen;
                const el = document.getElementById('doors-val');
                if (state.doorsOpen) {
                    el.innerText = "ОТКРЫТЫ";
                    el.className = "value status-on";
                } else {
                    el.innerText = "ЗАКРЫТЫ";
                    el.className = "value status-off";
                }
            }
        }

        function onKeyUp(e) {
            if (['ArrowLeft', 'ArrowRight', 'KeyA', 'KeyD', 'KeyW', 'KeyS'].includes(e.code)) {
                e.preventDefault();
            }
            keysPressed[e.code] = false;
        }

        function updatePhysics() {
            // Логика Газа (A)
            if (keysPressed['KeyA']) {
                if (state.polesUp) {
                    state.speed += state.acceleration;
                    if (state.speed > state.maxSpeed) state.speed = state.maxSpeed;
                } else {
                    document.getElementById('warning').style.display = 'block';
                }
            } else {
                if (document.getElementById('warning').style.display === 'block') {
                    document.getElementById('warning').style.display = 'none';
                }
            }

            // Логика Тормоза (D)
            if (keysPressed['KeyD']) {
                state.speed -= state.braking;
                if (state.speed < 0) state.speed = 0;
            }

            // Трение
            if (!keysPressed['KeyA'] && state.speed > 0) {
                state.speed -= state.friction;
                if (state.speed < 0) state.speed = 0;
            }

            // Рулевое управление (Стрелочки) + анимация руля в кабине
            const turnFactor = 0.02; // Стабильная скорость поворота
            if (keysPressed['ArrowLeft']) {
                state.heading += turnFactor * (state.speed * 1.2 + 0.2); // Поворачивает плавно, даже если еле ползет
                state.steering = Math.max(state.steering - 0.1, -1.2); 
            } else if (keysPressed['ArrowRight']) {
                state.heading -= turnFactor * (state.speed * 1.2 + 0.2);
                state.steering = Math.min(state.steering + 0.1, 1.2);
            } else {
                // Плавный возврат руля в исходное положение
                state.steering *= 0.85;
            }

            // Вращаем руль на экране через CSS
            document.getElementById('steering-wheel').style.transform = `rotateX(40deg) rotateZ(${state.steering * 90}deg)`;

            // Движение строго ВПЕРЕД (с учетом исправленного реверса осей)
            camera.position.x -= Math.sin(state.heading) * state.speed;
            camera.position.z -= Math.cos(state.heading) * state.speed;

            // Применяем стабильное вращение камеры
            camera.rotation.set(0, state.heading, 0);
        }

        function updateHUD() {
            const displaySpeed = Math.round(state.speed * 140);
            document.getElementById('speed-val').innerText = displaySpeed;
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateHUD();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
