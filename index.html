<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Симулятор Троллейбуса</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* HUD Интерфейс */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            pointer-events: none;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #00ffcc; text-transform: uppercase; }
        .param { margin: 8px 0; font-size: 14px; }
        .value { font-weight: bold; }
        .status-on { color: #00ff00; }
        .status-off { color: #ff3333; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ccc;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            border: 1px solid #444;
        }
        .key {
            background: #444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border-bottom: 2px solid #222;
        }
        #warning {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3333;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 20px;
            font-weight: bold;
            display: none;
            border: 2px solid #ff3333;
        }
    </style>
    <!-- Подключаем Three.js и GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Троллейбус ЗиУ-682</h2>
        <div class="param">Скорость: <span id="speed-val" class="value">0</span> км/ч</div>
        <div class="param">Штанги (Рога): <span id="poles-val" class="value status-off">ОПУЩЕНЫ</span></div>
        <div class="param">Двери: <span id="doors-val" class="value status-on">ОТКРЫТЫ</span></div>
    </div>

    <div id="warning">СНАЧАЛА ПОДНИМИТЕ РОГА (КЛАВИША S)!</div>

    <div id="controls-help">
        <strong>Управление:</strong><br>
        <span class="key">A</span> — Газ | <span class="key">D</span> — Тормоз<br>
        <span class="key">S</span> — Поднять/опустить рога<br>
        <span class="key">W</span> — Открыть/закрыть двери<br>
        <span class="key">←</span> <span class="key">→</span> — Руль (Стрелочки)
    </div>

    <script>
        // Основные переменные сцены
        let scene, camera, renderer;
        let cityModel;

        // Состояние троллейбуса
        let state = {
            polesUp: false,
            doorsOpen: true,
            speed: 0,
            maxSpeed: 0.8, // Максимальная внутренняя скорость
            braking: 0.02,
            acceleration: 0.01,
            friction: 0.004,
            heading: 0,    // Направление движения в радианах
            steering: 0    // Угол поворота руля
        };

        // Флаги нажатых клавиш
        const keysPressed = {};

        function init() {
            const container = document.getElementById('canvas-container');

            // 1. Создание сцены
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a24);
            scene.fog = new THREE.FogExp2(0x1a1a24, 0.015);

            // 2. Камера (Вид от первого лица)
            // Перевод координат из Blender (Z-up) в Three.js (Y-up):
            // Blender X:0, Y:0, Z:2 -> Three.js X:0, Y:2, Z:0
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0); 

            // 3. Рендерер
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // 4. Освещение
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            // 5. Контактная сеть и окружение по умолчанию (Резервный вариант)
            createFallbackEnvironment();

            // 6. Загрузка карты city.glb
            const loader = new THREE.GLTFLoader();
            loader.load(
                './city.glb',
                function (gltf) {
                    cityModel = gltf.scene;
                    scene.add(cityModel);
                    console.log("Карта city.glb успешно загружена!");
                },
                function (xhr) {
                    console.log((xhr.loaded / xhr.total * 100) + '% загружено карты');
                },
                function (error) {
                    console.warn("Файл city.glb не найден в папке. Запущено процедурное окружение.");
                }
            );

            // 7. Подписка на события клавиатуры
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);

            // Запуск цикла анимации
            animate();
        }

        // Процедурные провода и дороги на случай отсутствия city.glb
        function createFallbackEnvironment() {
            // Земля/Асфальт
            const groundGeo = new THREE.PlaneGeometry(1000, 1000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x222225, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Разметка дороги
            const roadGeo = new THREE.PlaneGeometry(6, 1000);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x333338, roughness: 0.7 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.01;
            scene.add(road);

            // Столбы и провода КС (Контактной сети)
            for (let z = -500; z < 500; z += 40) {
                // Столб слева
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.15, 8);
                const poleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
                const poleL = new THREE.Mesh(poleGeo, poleMat);
                poleL.position.set(-5, 4, z);
                scene.add(poleL);

                // Поперечный трос
                const wireGeo = new THREE.CylinderGeometry(0.01, 0.01, 10);
                const wireMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
                const wire = new THREE.Mesh(wireGeo, wireMat);
                wire.rotation.z = Math.PI / 2;
                wire.position.set(0, 7.5, z);
                scene.add(wire);
            }

            // Продольные контактные провода (два провода для штангового токосъема)
            const wireMaterial = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const wireLeftGeo = new THREE.CylinderGeometry(0.01, 0.01, 1000);
            const wireLeft = new THREE.Mesh(wireLeftGeo, wireMaterial);
            wireLeft.rotation.x = Math.PI / 2;
            wireLeft.position.set(-0.5, 7.4, 0);
            scene.add(wireLeft);

            const wireRight = wireLeft.clone();
            wireRight.position.set(0.5, 7.4, 0);
            scene.add(wireRight);
        }

        // Обработка нажатий
        function onKeyDown(e) {
            keysPressed[e.code] = true;

            // Одиночные переключения (Toggles)
            if (e.code === 'KeyS') { // Рога
                state.polesUp = !state.polesUp;
                const el = document.getElementById('poles-val');
                if (state.polesUp) {
                    el.innerText = "ПОДНЯТЫ";
                    el.className = "value status-on";
                    document.getElementById('warning').style.display = 'none';
                } else {
                    el.innerText = "ОПУЩЕНЫ";
                    el.className = "value status-off";
                }
            }

            if (e.code === 'KeyW') { // Двери
                state.doorsOpen = !state.doorsOpen;
                const el = document.getElementById('doors-val');
                if (state.doorsOpen) {
                    el.innerText = "ОТКРЫТЫ";
                    el.className = "value status-on";
                } else {
                    el.innerText = "ЗАКРЫТЫ";
                    el.className = "value status-off";
                }
            }
        }

        function onKeyUp(e) {
            keysPressed[e.code] = false;
        }

        // Обновление физики и перемещения
        function updatePhysics() {
            // Нажата кнопка Газ (A)
            if (keysPressed['KeyA']) {
                if (state.polesUp) {
                    state.speed += state.acceleration;
                    if (state.speed > state.maxSpeed) state.speed = state.maxSpeed;
                } else {
                    // Предупреждение, если пытаемся ехать без рогов
                    document.getElementById('warning').style.display = 'block';
                }
            } else {
                if (!keysPressed['KeyA'] && document.getElementById('warning').style.display === 'block') {
                    document.getElementById('warning').style.display = 'none';
                }
            }

            // Нажата кнопка Тормоз (D)
            if (keysPressed['KeyD']) {
                state.speed -= state.braking;
                if (state.speed < 0) state.speed = 0;
            }

            // Естественное трение и сопротивление воздуха, если не зажат газ
            if (!keysPressed['KeyA'] && state.speed > 0) {
                state.speed -= state.friction;
                if (state.speed < 0) state.speed = 0;
            }

            // Поворот руля (Стрелочки влево / вправо)
            if (keysPressed['ArrowLeft']) {
                state.heading += state.turnSpeed * (state.speed * 1.5); // Скорость поворота зависит от движения
            }
            if (keysPressed['ArrowRight']) {
                state.heading -= state.turnSpeed * (state.speed * 1.5);
            }

            // Изменение позиции камеры на основе вектора направления и скорости
            // Стало (теперь едем вперед):
            camera.position.x -= Math.sin(state.heading) * state.speed;
            camera.position.z -= Math.cos(state.heading) * state.speed;

            // Поворот взгляда камеры
            camera.rotation.y = state.heading;
        }

        // Обновление значений в HUD панели
        function updateHUD() {
            // Переводим внутреннюю скорость в условные км/ч для реалистичности отображения
            const displaySpeed = Math.round(state.speed * 120);
            document.getElementById('speed-val').innerText = displaySpeed;
        }

        // Главный игровой цикл
        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            updateHUD();

            renderer.render(scene, camera);
        }

        // Адаптация под изменение размеров окна браузера
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Запуск при загрузке страницы
        window.onload = init;
    </script>
</body>
</html>
